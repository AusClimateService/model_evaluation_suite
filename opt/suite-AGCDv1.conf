
export suitedir=/g/data/tp28/dev/eh6215/model_evaluation_suite/

export run_syclops=False
export run_icclim=True
export run_quantiles=False
export run_MSE=False
export run_radar_dist=False

export obsdata=True
export compute_project=tp28
export python_module_path="/g/data/access/ngm/modules"
export python_env="analysis3/21.10"
export user=eh6215
export storage_project_list="gdata/access+gdata/tp28+scratch/tp28+gdata/py18+gdata/xv83+gdata/xp65"

# run details likely to need changing between simulations
export start_year=1985
export end_year=2022


# run details likely to be more constant
export file_frequency=annual


export outdir=${suitedir}/output/obs/AGCDv1/
export logdir=${suitedir}/logs/obs_AGCDv1/
export data_path=/g/data/xv83/agcd-csiro/{var}/daily/
export filename={var}*_AGCD-CSIRO_r00_{year1}0101-{year1}0101_daily.nc


# ICCLIM options
export icclim_indices_tasmax="tmax:TX tmax:SU tmax:TXx tmax:CSU tmax:ID tmax:TXn"
export icclim_indices_tasmin="tmin:TN tmin:TR tmin:TNx tmin:FD tmin:CFD tmin:TNn"
