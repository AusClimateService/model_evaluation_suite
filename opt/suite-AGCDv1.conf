export icclim_slice_mode="year"
export icclim_walltime="00:90:00"
export icclim_mem=180GB
export icclim_jobfs=4GB
export icclim_ncpus=16
export icclim_queue=normal
export icclim_template=0.2
export NUMBA_CACHE_DIR=/scratch/tp28/$user/tmp
export icclim_indices_prcp_1hr=""  

# Quantile options
export quantile_variables="tasmax tasmin pr sfcWind"
export quantiles_tasmax="0.9 0.95 0.99 0.999"
export quantiles_tasmin="0.1 0.05 0.01 0.001 0.9 0.95 0.99 0.999"
